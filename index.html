<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Shahan Ahmed — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="loadingScreen">
    <div class="glass-bar"></div>
    <div class="glass-bar glass-bar-2"></div>
    <div class="loading-content">

      <div class="loading-rings">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>
      </div>

      <p class="loading-portfolio">— Portfolio of —</p>
      <p class="loading-title">SHAHAN AHMED</p>
      <p class="loading-subtitle">— AI Engineer &nbsp;||&nbsp; Educator &nbsp;||&nbsp; Instructor —</p>

      <div class="loading-bar-wrap" id="loadingBarWrap">
        <div class="loading-bar" id="loadingBar"></div>
      </div>

      <p class="loading-text" id="loadingText">Loading your portfolio...</p>

      <div class="continue-btn-wrap hidden" id="continueBtnWrap">
        <button class="glass-btn" id="continueBtn">
          Tap here to continue
          <svg class="tap-cursor" viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 12V6a3 3 0 0 0-6 0v8"></path>
            <path d="M12 14v4"></path>
            <path d="M9 13H7a2 2 0 0 0-2 2v2a6 6 0 0 0 6 6h4a5 5 0 0 0 5-5v-6a3 3 0 0 0-3-3h-2"></path>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
